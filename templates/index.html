<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Performance Predictor</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0f0f0f;
        color: white;
      }

      .container {
        text-align: center;
        padding: 60px;
        border-radius: 20px;
        background: #1b1b1b;
        box-shadow: 0px 0px 30px rgba(255, 255, 255, 0.08);
        width: 700px;
      }

      h1 {
        font-size: 48px;
        margin-bottom: 20px;
        color: #ffffff;
      }

      p {
        color: #cfcfcf;
        font-size: 18px;
        margin-bottom: 40px;
        line-height: 1.6;
      }

      .btn {
        display: inline-block;
        text-decoration: none;
        background: #4caf50;
        color: white;
        padding: 16px 40px;
        border-radius: 50px;
        font-size: 20px;
        font-weight: bold;
        transition: 0.3s;
      }

      .btn:hover {
        background: #2e7d32;
        transform: scale(1.05);
        box-shadow: 0px 0px 20px rgba(76, 175, 80, 0.5);
      }

      .footer {
        margin-top: 35px;
        color: #8a8a8a;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📊 Let's Predict Math Score</h1>

      <p>
        Predict a student's Mathematics score using Machine Learning based on
        demographic information and academic performance.
      </p>

      <a href="{{ url_for('predict_datapoint') }}" class="btn">
        Predict Now →
      </a>

      <div class="footer">Student Performance Prediction System</div>
    </div>
  </body>
</html>
