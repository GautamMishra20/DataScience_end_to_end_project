<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Student Performance Predictor</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #0d1117;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 30px;
      }

      .container {
        width: 700px;
        background: #161b22;
        border-radius: 15px;
        padding: 40px;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
      }

      h1 {
        text-align: center;
        margin-bottom: 10px;
        font-size: 34px;
      }

      .subtitle {
        text-align: center;
        color: #bdbdbd;
        margin-bottom: 35px;
      }

      .mb-3 {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
      }

      .form-control {
        width: 100%;
        padding: 13px;
        border: none;
        border-radius: 8px;
        background: #21262d;
        color: white;
        font-size: 16px;
      }

      .form-control:focus {
        outline: none;
        border: 2px solid #00c853;
      }

      .btn {
        width: 100%;
        padding: 15px;
        background: #00c853;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        background: #00e676;
        transform: translateY(-2px);
      }

      .result {
        margin-top: 30px;
        text-align: center;
        background: #21262d;
        padding: 20px;
        border-radius: 10px;
      }

      .result h2 {
        color: #00e676;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>📊 Student Performance Predictor</h1>
      <p class="subtitle">
        Predict the Mathematics Score using Machine Learning
      </p>

      <form action="{{ url_for('predict_datapoint') }}" method="post">
        <div class="mb-3">
          <label>Gender</label>
          <select class="form-control" name="gender" required>
            <option selected disabled value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>

        <div class="mb-3">
          <label>Race / Ethnicity</label>
          <select class="form-control" name="ethnicity" required>
            <option selected disabled value="">Select Group</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
          </select>
        </div>

        <div class="mb-3">
          <label>Parental Education</label>
          <select
            class="form-control"
            name="parental_level_of_education"
            required
          >
            <option selected disabled>Select Education</option>
            <option value="associate's degree">Associate's Degree</option>
            <option value="bachelor's degree">Bachelor's Degree</option>
            <option value="high school">High School</option>
            <option value="master's degree">Master's Degree</option>
            <option value="some college">Some College</option>
            <option value="some high school">Some High School</option>
          </select>
        </div>

        <div class="mb-3">
          <label>Lunch Type</label>
          <select class="form-control" name="lunch" required>
            <option selected disabled>Select Lunch</option>
            <option value="standard">Standard</option>
            <option value="free/reduced">Free / Reduced</option>
          </select>
        </div>

        <div class="mb-3">
          <label>Test Preparation Course</label>
          <select class="form-control" name="test_preparation_course" required>
            <option selected disabled>Select Course</option>
            <option value="none">None</option>
            <option value="completed">Completed</option>
          </select>
        </div>

        <div class="mb-3">
          <label>Reading Score</label>
          <input
            class="form-control"
            type="number"
            name="reading_score"
            min="0"
            max="100"
            placeholder="Enter Reading Score"
            required
          />
        </div>

        <div class="mb-3">
          <label>Writing Score</label>
          <input
            class="form-control"
            type="number"
            name="writing_score"
            min="0"
            max="100"
            placeholder="Enter Writing Score"
            required
          />
        </div>

        <div class="mb-3">
          <input class="btn" type="submit" value="Predict Math Score" />
        </div>
      </form>

      {% if results %}

      <div class="result">
        <h3>Predicted Mathematics Score</h3>
        <h2>{{ results }}</h2>
      </div>

      {% endif %}
    </div>
  </body>
</html>
